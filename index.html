        { ko: "이자카야 호박색", en: "warm amber izakaya lighting, deep shadows, intimate low-key glow" },
        { ko: "스튜디오 강한 플래시", en: "strong front flash lighting, bold highlights and sharp shadows, washed-out flash aesthetic" },
        { ko: "앰버 데스크램프", en: "single warm amber desk lamp, soft shadows, warm intimate pool of light" },
        { ko: "하이키 디퓨즈", en: "high-key diffused lighting, soft and even, cool tones, ethereal glow" },
        { ko: "마젠타 림라이트", en: "cool spotlight from above with magenta rim light from below, dramatic stage effect" },
        { ko: "유리 투과 햇살", en: "warm sunlight filtering through glass ceiling or windows, soft highlights and shadows" },
        { ko: "봄 자연광", en: "bright spring natural daylight, fresh and airy, clean soft shadows" },
        { ko: "RAW 플래시", en: "hard front flash, sharp glare and shadows, raw candid compact camera feel" },
        { ko: "스팀 디퓨즈", en: "soft diffused light through steam or haze, intimate and cinematic, minimal background" },
        { ko: "Douyin 뷰티", en: "Douyin China baby-face pink makeup style, flawless glowing porcelain skin, puppy-eye eyeliner, glossy gradient lip, aegyo-sal, dreamy aesthetic tone" },
        { ko: "뷰티 플래터링", en: "soft flattering beauty light, evenly lit face with subtle glow, professional beauty photo tone, high detail skin, cinematic depth of field" },
        { ko: "로우키 선셋 림라이트", en: "low key lighting mixed with warm sunset light, strong rim light on hair and shoulders, soft shadow on one side of face, subtle contrast, natural skin tone, soft highlight on skin" },
        { ko: "럭셔리 패션 시네마틱", en: "luxury fashion editorial, cinematic mood, real photograph aesthetic, RAW photo quality, 8K sharp focus, no illustration no anime" },
        { ko: "재패니즈 네거티브 필름", en: "Japanese negative film aesthetic, low contrast, muted tones, subtle film grain, slight highlight bloom, soft diffused indoor light, quiet and distant mood" },
        { ko: "선릿 아웃도어 페스티벌", en: "bright summer sunlight, outdoor stage lighting, water mist catching light, polished and energetic festival mood" },
        { ko: "텀한 실내 홈", en: "dim home interior lighting, intimate and casual, soft warm ambient glow, everyday private atmosphere" },
        { ko: "DSLR 캔디드 홈", en: "DSLR look, 50mm lens, shallow depth of field, soft ambient indoor warm lighting, natural shadows, slight grain, no over-sharpening, real-life texture, not AI-looking, natural imperfections" },
        { ko: "스트로브 모션블러 클럽", en: "strong motion blur, streaking colored lights from strobes, handheld snapshot energy, chaotic and electric nightclub lighting" },
        { ko: "코닥 골드 200 필름", en: "Kodak Gold 200 35mm film aesthetic, warm slightly brownish color cast, fine natural film grain, soft halation, rich warm tones, analog photography feel" },
        { ko: "야간 플래시 글로우", en: "nighttime strong camera flash, intense glowing face effect, sharp focus on face and upper body, high detail, no blur, no bokeh, 9:16" },
        { ko: "글라스 스킨 뷰티 스튜디오", en: "bright soft evenly diffused studio lighting from front and side, no harsh shadows, Korean glass skin aesthetic, luminous dewy hydrated skin, glossy pink lips, subtle shine on jet black hair, slightly low-angle perspective" },
        { ko: "초광각 로우앵글 패션", en: "ultra low angle almost floor level, wide-angle lens with strong perspective distortion, objects near camera greatly exaggerated, vertical composition emphasizing shoes legs and stretched body line, shallow depth of field sharp on foreground sneaker, bold modern experimental fashion photography energy" },
        { ko: "직사광+온캠 플래시 다크럭셔리", en: "aggressive direct sunlight combined with on-camera flash, underexposed -1.5 EV dark luxury mood, Canon PowerShot G7X Mark III pop flash, 35mm film grain, sharp eyes, realistic water texture" },
        { ko: "다이렉트 플래시 콜드 시네마틱", en: "direct flash lighting creating strong contrast, illuminating subject against dark background, cold cinematic winter mood, fine grain, sharp detail" },
      ],
    };

    const FACE_LOCK = `IMPORTANT: maintain exact facial identity from reference — same face shape, eye shape, nose, lips. Do not alter facial features. Face consistency is top priority.`;

    const CHARACTERS = [
      { id: "이서윤", color: "#C084FC" },
      { id: "김하린", color: "#60A5FA" },
      { id: "윤세린", color: "#34D399" },
      { id: "한지우", color: "#F97316" },
      { id: "공통", color: "#94A3B8" },
    ];

    function pickRandom(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function generatePrompt() {
      const loc = pickRandom(PROMPT_POOLS.location);
      const mood = pickRandom(PROMPT_POOLS.mood);
      const outfit = pickRandom(PROMPT_POOLS.outfit);
      const action = pickRandom(PROMPT_POOLS.action);
      const light = pickRandom(PROMPT_POOLS.lighting);

      return {
        parts: { loc, mood, outfit, action, light },
        prompt: `${action.en}, ${loc.en}, ${outfit.en}, ${light.en}, ${mood.en}, photorealistic portrait photography, 85mm lens, shallow depth of field, high detail skin texture. ${FACE_LOCK}`,
        tags: [action.ko, loc.ko, outfit.ko, light.ko, mood.ko],
      };
    }

    function App() {
      const [selected, setSelected] = useState("공통");
      const [result, setResult] = useState(null);
      const [copied, setCopied] = useState(false);
      const [history, setHistory] = useState([]);

      const handleGenerate = useCallback(() => {
        const gen = generatePrompt();
        setResult(gen);
        setCopied(false);
        setHistory((prev) => [{ ...gen, char: selected, id: Date.now() }, ...prev.slice(0, 4)]);
      }, [selected]);

      const handleCopy = () => {
        if (!result) return;
        navigator.clipboard.writeText(result.prompt);
        setCopied(true);
        setTimeout(() => setCopied(false), 2000);
      };

      const activeChar = CHARACTERS.find((c) => c.id === selected);

      return (
        <div style={{
          minHeight: "100vh",
          background: "#0D0D12",
          color: "#E8E8F0",
          fontFamily: "'Pretendard Variable', 'Pretendard', 'Apple SD Gothic Neo', sans-serif",
          padding: "32px 20px",
          maxWidth: 720,
          margin: "0 auto",
        }}>
          {/* Header */}
          <div style={{ marginBottom: 32 }}>
            <div style={{ fontSize: 11, letterSpacing: "0.2em", color: "#666", textTransform: "uppercase", marginBottom: 8 }}>
              Character Profile
            </div>
            <h1 style={{ fontSize: 26, fontWeight: 700, margin: 0, color: "#F0F0F8" }}>
              랜덤 프롬프트 생성기
            </h1>
            <p style={{ fontSize: 13, color: "#666", marginTop: 6 }}>
              인물 프로필 공통 적용 · Face Lock 포함
            </p>
          </div>

          {/* Character Selector */}
          <div style={{ marginBottom: 28 }}>
            <div style={{ fontSize: 11, color: "#666", marginBottom: 10, letterSpacing: "0.1em" }}>CHARACTER</div>
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
              {CHARACTERS.map((c) => (
                <button
                  key={c.id}
                  onClick={() => setSelected(c.id)}
                  style={{
                    padding: "7px 16px",
                    borderRadius: 6,
                    border: selected === c.id ? `1.5px solid ${c.color}` : "1.5px solid #2A2A35",
                    background: selected === c.id ? `${c.color}18` : "transparent",
                    color: selected === c.id ? c.color : "#666",
                    fontSize: 13,
                    fontWeight: selected === c.id ? 600 : 400,
                    cursor: "pointer",
                    transition: "all 0.15s",
                  }}
                >
                  {c.id}
                </button>
              ))}
            </div>
          </div>

          {/* Generate Button */}
          <button
            onClick={handleGenerate}
            style={{
              width: "100%",
              padding: "14px",
              borderRadius: 10,
              border: "none",
              background: `linear-gradient(135deg, ${activeChar?.color}CC, ${activeChar?.color}88)`,
              color: "#fff",
              fontSize: 15,
              fontWeight: 700,
              cursor: "pointer",
              letterSpacing: "0.05em",
              marginBottom: 24,
              transition: "opacity 0.15s",
            }}
            onMouseEnter={(e) => e.currentTarget.style.opacity = 0.85}
            onMouseLeave={(e) => e.currentTarget.style.opacity = 1}
          >
            ✦ 랜덤 생성
          </button>

          {/* Result */}
          {result && (
            <div style={{
              background: "#13131A",
              border: "1px solid #1E1E2A",
              borderRadius: 12,
              padding: 20,
              marginBottom: 24,
            }}>
              {/* Tags */}
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 16 }}>
                {result.tags.map((tag, i) => (
                  <span key={i} style={{
                    fontSize: 11,
                    padding: "3px 10px",
                    borderRadius: 20,
                    background: "#1E1E2A",
                    color: activeChar?.color,
                    fontWeight: 500,
                  }}>
                    {tag}
                  </span>
                ))}
              </div>

              {/* Prompt Text */}
              <p style={{
                fontSize: 13,
                lineHeight: 1.75,
                color: "#C8C8D8",
                margin: "0 0 16px 0",
                wordBreak: "break-word",
              }}>
                {result.prompt}
              </p>

              {/* Face Lock Badge */}
              <div style={{
                fontSize: 11,
                color: "#F59E0B",
                background: "#F59E0B14",
                border: "1px solid #F59E0B30",
                borderRadius: 6,
                padding: "6px 10px",
                marginBottom: 14,
              }}>
                🔒 Face Lock 포함됨
              </div>

              {/* Copy Button */}
              <button
                onClick={handleCopy}
                style={{
                  width: "100%",
                  padding: "10px",
                  borderRadius: 8,
                  border: `1px solid ${copied ? "#34D399" : "#2A2A35"}`,
                  background: copied ? "#34D39914" : "transparent",
                  color: copied ? "#34D399" : "#888",
                  fontSize: 13,
                  cursor: "pointer",
                  transition: "all 0.2s",
                }}
              >
                {copied ? "✓ 복사됨" : "프롬프트 복사"}
              </button>
            </div>
          )}

          {/* History */}
          {history.length > 0 && (
            <div>
              <div style={{ fontSize: 11, color: "#444", letterSpacing: "0.1em", marginBottom: 12 }}>RECENT</div>
              {history.map((h) => {
                const hChar = CHARACTERS.find((c) => c.id === h.char);
                return (
                  <div
                    key={h.id}
                    style={{
                      padding: "12px 14px",
                      borderRadius: 8,
                      border: "1px solid #1A1A22",
                      marginBottom: 8,
                      cursor: "pointer",
                      transition: "border-color 0.15s",
                    }}
                    onClick={() => { setResult(h); setSelected(h.char); setCopied(false); }}
                    onMouseEnter={(e) => e.currentTarget.style.borderColor = "#2A2A35"}
                    onMouseLeave={(e) => e.currentTarget.style.borderColor = "#1A1A22"}
                  >
                    <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 6 }}>
                      <span style={{ fontSize: 10, color: hChar?.color, fontWeight: 600 }}>{h.char}</span>
                      {h.tags.slice(0, 3).map((t, i) => (
                        <span key={i} style={{ fontSize: 10, color: "#555" }}>{t}</span>
                      ))}
                    </div>
                    <p style={{ fontSize: 11, color: "#555", margin: 0, overflow: "hidden", whiteSpace: "nowrap", textOverflow: "ellipsis" }}>
                      {h.prompt}
                    </p>
                  </div>
                );
              })}
            </div>
          )}

          {/* Pool Info */}
          <div style={{ marginTop: 32, padding: "14px 16px", borderRadius: 8, background: "#0F0F16", border: "1px solid #1A1A22" }}>
            <div style={{ fontSize: 11, color: "#444", marginBottom: 8 }}>POOL SIZE</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "4px 20px" }}>
              {[
                ["장소", PROMPT_POOLS.location.length],
                ["무드", PROMPT_POOLS.mood.length],
                ["의상", PROMPT_POOLS.outfit.length],
                ["동작", PROMPT_POOLS.action.length],
                ["조명", PROMPT_POOLS.lighting.length],
              ].map(([k, v]) => (
                <div key={k} style={{ fontSize: 11, color: "#555", display: "flex", justifyContent: "space-between" }}>
                  <span>{k}</span><span style={{ color: "#888" }}>{v}종</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
